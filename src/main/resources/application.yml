spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/wallet}
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:admin}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
app:
  commission:
    percent: 0.01
    tech-accounts:
      RUB: "00000000-0000-0000-0000-000000000001"
      EUR: "00000000-0000-0000-0000-000000000002"
      USD: "00000000-0000-0000-0000-000000000003"